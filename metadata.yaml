# 插件展示名（市场显示）
name: "astrbot_plugin_digital_member"
display_name: "DM 数字分身"
desc: "Digital Member分析群友历史消息，生成说话风格和个人画像，支持模仿群友进行交流"
short_desc: "分析群友说话风格，生成数字分身，让AI模仿群友聊天"

version: "0.0.1"
author: "Leafiber"
repo: "https://github.com/Leafliber/astrbot_plugin_digital_member"

# 支持所有平台适配器（依赖 message_recorder 获取历史消息）
# support_platforms 不设置限制，表示支持所有平台

# AstrBot 版本约束（PEP 440 格式）
astrbot_version: ">=4.16,<5"

support_platforms:
  - aiocqhttp

# 插件依赖
dependencies:
  - "astrbot_plugin_message_recorder"

# 可选依赖（增强功能，未安装时不影响基本使用）
optional_dependencies:
  - "astrbot_plugin_iris_chat_memory"